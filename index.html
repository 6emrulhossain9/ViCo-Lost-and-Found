<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Lost & Found</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrap">

    <header class="site-header">
      <div class="nav-inner">
        <a class="logo" href="index.html">
          <span class="logo-icon">🎒</span>
          <span>Campus Lost &amp; Found</span>
        </a>
        <nav class="main-nav">
          <a href="index.html">Home</a>
          <a href="add.html">Add Item</a>
          <a href="my-submissions.html">My Submissions</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <h1 class="page-title">Browse Lost &amp; Found Items</h1>

      <div class="toolbar">
        <div class="search-box">
          <span class="icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search by item name or description...">
        </div>

        <div class="filter-pills">
          <button class="pill active" data-filter="all">All</button>
          <button class="pill" data-filter="lost">Lost</button>
          <button class="pill" data-filter="found">Found</button>
        </div>

        <select id="sortSelect">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
        </select>
      </div>

      <div class="grid" id="itemsGrid"></div>

      <div class="empty-state hidden" id="emptyState">
        <div class="empty-icon">📭</div>
        <p class="empty-text">No items yet. Be the first to report something!</p>
        <a href="add.html" class="btn btn-primary mt-16">Report an Item</a>
      </div>

      <div class="load-more-wrap">
        <button class="btn btn-outline hidden" id="loadMoreBtn">Load More</button>
      </div>
    </main>

    <a href="add.html" class="fab" title="Add Item">+</a>

    <footer class="site-footer">
      <div class="footer-links">
        <a href="#about">About</a>
        <a href="mailto:lostfound@campus.edu">Contact</a>
      </div>
      <div>&copy; 2026 Campus Lost &amp; Found. Built for SD3 Web Application Development.</div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
